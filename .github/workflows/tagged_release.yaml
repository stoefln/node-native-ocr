name: Build & Publish tagged release

on:
  push:
    tags:
      - v*

env:
  REQUIRED_ELECTRON_VERSION: 40.8.0

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            node_arch: arm64
            build_for_arch: arm64
          - os: macos-14
            target: darwin-x64
            node_arch: x64
            build_for_arch: x64
          - os: windows-latest
            target: win32-x64
            node_arch: x64
            build_for_arch: x64
          - os: ubuntu-latest
            target: linux-x64
            node_arch: x64
            build_for_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rosetta (macOS x64)
        if: runner.os == 'macOS' && matrix.target == 'darwin-x64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.node_arch }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Windows compiler tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build native dependencies
        env:
          BUILD_FOR_ARCH: ${{ matrix.build_for_arch }}
        run: |
          npm run clean-tesseract
          npm run build-tesseract

      - name: Build prebuilds
        run: npm run prebuildify

      - name: Verify target prebuild exists
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const dir=path.join('prebuilds','${{ matrix.target }}'); if(!fs.existsSync(dir)) throw new Error('Missing prebuild dir: '+dir); const files=fs.readdirSync(dir).filter(name => name.endsWith('.node')); if(files.length===0) throw new Error('No .node prebuild found in '+dir); console.log('Found prebuilds:', files.join(', '));"

      - name: Prepare bundled Windows native runtime DLL artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runtimeDir = "$env:GITHUB_WORKSPACE\runtime\win32-x64"
          New-Item -ItemType Directory -Path $runtimeDir -Force | Out-Null
          Get-ChildItem -Path $runtimeDir -File | Remove-Item -Force

          $nativeDirs = @(
            "$env:GITHUB_WORKSPACE\tesseract\build\bin\bin",
            "$env:GITHUB_WORKSPACE\leptonica\build\bin\bin",
            "$env:GITHUB_WORKSPACE\libtiff\build\bin\bin",
            "$env:GITHUB_WORKSPACE\libpng\build\bin\bin",
            "$env:GITHUB_WORKSPACE\libjpeg\build\bin\bin",
            "$env:GITHUB_WORKSPACE\zlib\build\bin\bin"
          )

          foreach ($dir in $nativeDirs) {
            if (!(Test-Path $dir)) {
              continue
            }

            Get-ChildItem -Path $dir -Filter *.dll | ForEach-Object {
              Copy-Item $_.FullName -Destination (Join-Path $runtimeDir $_.Name) -Force
            }
          }

          $dllCount = (Get-ChildItem -Path $runtimeDir -Filter *.dll).Count
          if ($dllCount -eq 0) {
            throw "No runtime DLLs were copied into $runtimeDir"
          }

          Write-Host "Bundled runtime DLLs from build outputs:"
          Get-ChildItem -Path $runtimeDir | Select-Object Name,Length

      - name: Verify required Electron target compatibility
        if: runner.os != 'Windows'
        run: node ./scripts/verify-electron-target.js "${{ env.REQUIRED_ELECTRON_VERSION }}"

      - name: Upload prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: prebuilds/
          retention-days: 1

      - name: Upload bundled Windows native runtime DLL artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: runtime-win32-x64
          path: runtime/win32-x64/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-all
          pattern: prebuilds-*
          merge-multiple: true

      - name: Download bundled Windows native runtime DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-win32-x64
          path: runtime/win32-x64

      - name: Merge prebuilds into package
        run: |
          mkdir -p prebuilds
          cp -r prebuilds-all/* prebuilds/
          ls -la prebuilds/
          find prebuilds -name '*.node' -type f

      - name: Verify bundled Windows native runtime DLLs
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const runtimeDir=path.join('runtime','win32-x64'); if(!fs.existsSync(runtimeDir)) throw new Error('Missing runtime dir: '+runtimeDir); const files=fs.readdirSync(runtimeDir); const dllCount=files.filter(name => name.toLowerCase().endsWith('.dll')).length; if(dllCount===0) throw new Error('No DLL files found in runtime/win32-x64'); if(files.some(name => name.toLowerCase() === 'tesseract.exe')) throw new Error('Unexpected runtime/win32-x64/tesseract.exe in native-only package'); console.log('runtime files:', files.join(', '));"

      - name: Verify all release prebuild targets are present
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const targets=['darwin-arm64','darwin-x64','win32-x64','linux-x64']; for (const target of targets) { const dir=path.join('prebuilds', target); if (!fs.existsSync(dir)) throw new Error('Missing prebuild dir: '+dir); const files=fs.readdirSync(dir).filter(name => name.endsWith('.node')); if (files.length === 0) throw new Error('No .node prebuild found in '+dir); } console.log('All required prebuild targets exist.');"

      - name: Install dependencies (skip scripts)
        run: npm ci --ignore-scripts

      - name: Align package version with tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs'); const tag=process.env.TAG_VERSION || ''; const version=tag.startsWith('v') ? tag.slice(1) : tag; if(!version){throw new Error('Missing tag version');} const pkgPath='package.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); if(pkg.version!==version){pkg.version=version; fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\\n'); console.log('Updated package version to', version);} else {console.log('Package version already', version);}"

      - name: Show package contents
        run: npm pack --dry-run

      - name: Verify packed tarball contains bundled Windows native runtime DLLs
        run: |
          TARBALL=$(node -e "const pkg=require('./package.json'); const tarName=(pkg.name + '-' + pkg.version).replace('@','').replace('/','-') + '.tgz'; process.stdout.write(tarName);")
          npm pack --quiet > /dev/null
          test -f "$TARBALL"
          node -e "const {execFileSync}=require('child_process'); const tarball=process.argv[1]; const listing=execFileSync('tar',['-tzf',tarball],{encoding:'utf8'}).split(/\r?\n/).filter(Boolean); const hasExe=listing.includes('package/runtime/win32-x64/tesseract.exe'); const hasDll=listing.some(name => /^package\/runtime\/win32-x64\/.*\.dll$/i.test(name)); if(hasExe){throw new Error('Packed tarball unexpectedly contains runtime/win32-x64/tesseract.exe');} if(!hasDll){throw new Error('Packed tarball missing runtime/win32-x64/*.dll');} console.log('Verified runtime DLL entries in packed tarball.');" "$TARBALL"

      - name: Pack release tarball
        run: npm pack

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp ./*.tgz release-assets/
          for target in prebuilds/*; do
            [ -d "$target" ] || continue
            target_name=$(basename "$target")
            (cd prebuilds && zip -r "../release-assets/prebuilds-${target_name}.zip" "$target_name")
          done
          ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*

      - name: Publish tagged release
        run: npm publish --provenance
